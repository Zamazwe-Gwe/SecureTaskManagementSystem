<!DOCTYPE html>
<html>
<head>
    <title>Student Task Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary px-4">
    <a class="navbar-brand fw-bold" href="{% url 'task_list' %}">Student Task Manager</a>

    <div class="ms-auto d-flex align-items-center">
        <span class="me-3">Welcome, {{ user.username }}</span>

        <form method="POST" action="{% url 'logout' %}">
            {% csrf_token %}
            <button class="btn btn-outline-light btn-sm" type="submit">Logout</button>
        </form>
    </div>
</nav>

<div class="container mt-5">
<div class="card bg-dark border-primary shadow-lg">        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold">My Tasks</h2>
                <a href="{% url 'task_create' %}" class="btn btn-primary">+ Create New Task</a>
            </div>

            <table class="table table-dark table-hover table-bordered align-middle">
                <thead class="table-primary">
                    <tr>
                        <th>Title</th>
                        <th>Description</th>
                        <th>Status</th>
                        <th>Owner</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody>
                {% for task in tasks %}
                    <tr>
                        <td>{{ task.title }}</td>
                        <td>{{ task.description }}</td>
                        <td>
                            <span class="badge bg-info text-dark">{{ task.status }}</span>
                        </td>
                        <td>{{ task.owner.username }}</td>
                        <td>
                            <a href="{% url 'task_update' task.id %}" class="btn btn-warning btn-sm">Edit</a>
                            <a href="{% url 'task_delete' task.id %}" class="btn btn-danger btn-sm">Delete</a>
                        </td>
                    </tr>
                {% empty %}
                    <tr>
                        <td colspan="5" class="text-center">No tasks yet.</td>
                    </tr>
                {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
