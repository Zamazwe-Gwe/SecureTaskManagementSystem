<!DOCTYPE html>
<html>
<head>
    <title>Task Form | Student Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-light">

<nav class="navbar navbar-dark bg-primary px-4">
    <a class="navbar-brand fw-bold" href="{% url 'task_list' %}">Student Task Manager</a>
</nav>

<div class="container d-flex justify-content-center mt-5">
    <div class="card bg-dark border-primary shadow-lg" style="width: 600px;">
        <div class="card-body p-4">
            <h2 class="fw-bold mb-4">Create / Edit Task</h2>

           <form method="POST">
    {% csrf_token %}

    <div class="mb-3">
        <label class="form-label text-light">Title</label>
        {{ form.title }}
    </div>

    <div class="mb-3">
        <label class="form-label text-light">Description</label>
        {{ form.description }}
    </div>

    <div class="mb-4">
        <label class="form-label text-light">Status</label>
        {{ form.status }}
    </div>

    <button type="submit" class="btn btn-primary">Save Task</button>
    <a href="{% url 'task_list' %}" class="btn btn-outline-light">Cancel</a>
</form>
        </div>
    </div>
</div>

</body>
</html>
