<!DOCTYPE html>
<html>
<head>
    <title>Register | Student Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-light">

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card bg-dark border-primary shadow-lg p-4" style="width: 430px;">

        <h2 class="text-center text-primary fw-bold mb-2">Student Task Manager</h2>
        <p class="text-center text-secondary mb-4">Create your account</p>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label text-light">Username</label>
                {{ form.username }}
            </div>

            <div class="mb-3">
                <label class="form-label text-light">Password</label>
                {{ form.password1 }}
            </div>

            <div class="mb-3">
                <label class="form-label text-light">Confirm Password</label>
                {{ form.password2 }}
            </div>

            <button type="submit" class="btn btn-primary w-100 mt-3">
                Register
            </button>
        </form>

        <p class="text-center text-secondary mt-4 mb-0">
            Already have an account?
            <a href="{% url 'login' %}" class="text-info">Login</a>
        </p>

    </div>
</div>

</body>
</html>
