<!DOCTYPE html>
<html>
<head>
    <title>Profile | Student Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-light">

<nav class="navbar navbar-dark bg-primary px-4">
    <a class="navbar-brand fw-bold" href="{% url 'task_list' %}">Student Task Manager</a>
</nav>

<div class="container mt-5">
    <div class="card bg-dark border-primary text-light shadow-lg p-4">
        <h2>My Profile</h2>
        <p><strong>Username:</strong> {{ user.username }}</p>
        <p><strong>Email:</strong> {{ user.email }}</p>
        <p><strong>Date Joined:</strong> {{ user.date_joined }}</p>

        <a href="{% url 'task_list' %}" class="btn btn-primary">Back to Tasks</a>
    </div>
</div>

</body>
</html>
